{% include base_path %}

<header class="masthead" role="banner">
  <nav id="site-nav" class="folio-nav" aria-label="Primary navigation">
    <a class="folio-nav__brand" href="{{ base_path }}/">{{ site.name | default: site.title }}</a>

    <div class="folio-nav__links">
      {% for link in site.data.navigation.main %}
        {% if link.url contains 'http' %}
          {% assign domain = '' %}
        {% else %}
          {% assign domain = base_path %}
        {% endif %}
        <a href="{{ domain }}{{ link.url }}">{{ link.title }}</a>
      {% endfor %}
      <button class="folio-theme-toggle" type="button" aria-label="Toggle color theme" aria-pressed="false">
        <i class="fas fa-moon" aria-hidden="true"></i>
      </button>
    </div>
  </nav>
</header>
