name: Update ADS publications

on:
  schedule:
    - cron: "30 0 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-publications:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Update BibTeX from ADS library
        env:
          ADS_DEV_KEY: ${{ secrets.ADS_API_TOKEN }}
        run: python bin/update_ads_publications.py

      - name: Verify ADS citation counts
        run: |
          if ! grep -q "ads_citations" _bibliography/papers.bib; then
            echo "No ads_citations fields were written to _bibliography/papers.bib."
            echo "First lines of generated BibTeX:"
            sed -n '1,80p' _bibliography/papers.bib
            exit 1
          fi
          grep -n "ads_citations" _bibliography/papers.bib | head

      - name: Commit updated publications
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update publications from ADS"
          file_pattern: "_bibliography/papers.bib _news/ads-publication-*.md"
